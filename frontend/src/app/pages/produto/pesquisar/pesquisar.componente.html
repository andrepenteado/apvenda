<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">
      <a routerLink="/pagina-inicial">
        <i class="fa-solid fa-house me-1"></i>
        Início
      </a>
    </li>
    <li class="breadcrumb-item active" aria-current="page">Produtos</li>
  </ol>
</nav>

<section class="container py-3">
  <section class="row g-3 align-items-start mb-4">
    <div class="col">
      <div class="text-uppercase small text-secondary fw-semibold mb-1">
        <i class="fa-solid fa-table-list me-1"></i>
        Pesquisar
      </div>
      <h1 class="h3 fw-bold mb-1">Produtos</h1>
      <p class="text-secondary mb-0">Consulte e mantenha os produtos cadastrados.</p>
    </div>
    <div class="col-auto">
      <button type="button" class="btn btn-primary" (click)="novo()">
        <i class="fa-solid fa-plus me-1"></i>
        Novo
      </button>
    </div>
  </section>

  <section class="row g-3 mb-4 d-none d-md-flex">
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="text-secondary small">Total listado</div>
          <div class="fs-4 fw-semibold">{{ totalListado }}</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="text-secondary small">Campo principal</div>
          <div class="fs-5 fw-semibold">Nome</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="text-secondary small">Filtros disponíveis</div>
          <div class="fs-5 fw-semibold">Nome, categoria, marca, unidade e ativo</div>
        </div>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="card-header d-flex align-items-center justify-content-start">
      <button
        type="button"
        class="btn btn-outline-secondary btn-sm"
        data-bs-toggle="collapse"
        data-bs-target="#produto-filtros"
        aria-expanded="false"
        aria-controls="produto-filtros">
        <i class="fa-solid fa-filter me-1"></i>
        Filtrar Pesquisa
      </button>
    </div>

    <div id="produto-filtros" class="collapse filters-collapse">
      <div class="card-body border-bottom">
        <form class="row g-2 align-items-center" (ngSubmit)="pesquisar()">
          <div class="col-12 col-md">
            <input
              id="filtro-nome"
              type="text"
              name="nome"
              class="form-control"
              placeholder="Nome"
              aria-label="Nome"
              [(ngModel)]="filtro.nome">
          </div>
          <div class="col-12 col-md">
            <input
              id="filtro-codigo-barras"
              type="text"
              name="codigoBarras"
              class="form-control"
              placeholder="Código de Barras"
              aria-label="Código de Barras"
              [(ngModel)]="filtro.codigoBarras">
          </div>
          <div class="col-12 col-md">
            <ng-select
              id="filtro-categoria"
              name="categoria"
              class="ng-select-bootstrap"
              [items]="categorias"
              bindLabel="nome"
              bindValue="id"
              placeholder="Categoria"
              aria-label="Categoria"
              [(ngModel)]="filtro.categoria">
            </ng-select>
          </div>
          <div class="col-12 col-md">
            <ng-select
              id="filtro-marca"
              name="marca"
              class="ng-select-bootstrap"
              [items]="marcas"
              bindLabel="nome"
              bindValue="id"
              placeholder="Marca"
              aria-label="Marca"
              [(ngModel)]="filtro.marca">
            </ng-select>
          </div>
          <div class="col-12 col-md">
            <ng-select
              id="filtro-unidade"
              name="unidade"
              class="ng-select-bootstrap"
              [items]="unidades"
              bindLabel="label"
              bindValue="valor"
              placeholder="Unidade"
              aria-label="Unidade"
              [(ngModel)]="filtro.unidade">
            </ng-select>
          </div>
          <div class="col-12 col-md">
            <select
              id="filtro-ativo"
              name="ativo"
              class="form-select"
              [class.text-secondary]="filtro.ativo === null"
              aria-label="Ativo?"
              [(ngModel)]="filtro.ativo">
              <option [ngValue]="null" disabled>Ativo?</option>
              <option [ngValue]="true">Sim</option>
              <option [ngValue]="false">Não</option>
            </select>
          </div>
          <div class="col-6 col-md-auto">
            <button type="submit" class="btn btn-primary w-100" title="Pesquisar" aria-label="Pesquisar">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
          <div class="col-6 col-md-auto">
            <button type="button" class="btn btn-outline-secondary w-100" title="Limpar filtros" aria-label="Limpar filtros" (click)="limparFiltros()">
              <i class="fa-solid fa-eraser"></i>
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="card-body">
      <!-- Grid server-side: as linhas são renderizadas pelo DataTables. -->
      <div class="table-responsive">
        <table id="datatables-pesquisar-produtos" class="table table-striped table-hover align-middle w-100">
          <thead>
            <tr>
              <th>Ações</th>
              <th>ID</th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Marca</th>
              <th>Preço de Venda</th>
              <th>Estoque Atual</th>
              <th>Ativo?</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>
  </section>
</section>
