<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">
      <a routerLink="/pagina-inicial">
        <i class="fa-solid fa-house me-1"></i>
        Início
      </a>
    </li>
    <li class="breadcrumb-item active" aria-current="page">Clientes</li>
  </ol>
</nav>

<section class="container py-3">
  <section class="row g-3 align-items-start mb-4">
    <div class="col">
      <div class="text-uppercase small text-secondary fw-semibold mb-1">
        <i class="fa-solid fa-table-list me-1"></i>
        Pesquisar
      </div>
      <h1 class="h3 fw-bold mb-1">Clientes</h1>
      <p class="text-secondary mb-0">Consulte e mantenha os clientes cadastrados.</p>
    </div>
    <div class="col-auto">
      <button type="button" class="btn btn-primary" (click)="novo()">
        <i class="fa-solid fa-plus me-1"></i>
        Novo
      </button>
    </div>
  </section>

  <section class="row g-3 mb-4 d-none d-md-flex">
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="text-secondary small">Total listado</div>
          <div class="fs-4 fw-semibold">{{ totalListado }}</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="text-secondary small">Campo principal</div>
          <div class="fs-5 fw-semibold">Nome</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <div class="text-secondary small">Filtros disponíveis</div>
          <div class="fs-5 fw-semibold">Nome e CPF/CNPJ</div>
        </div>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="card-header d-flex align-items-center justify-content-start">
      <button
        type="button"
        class="btn btn-outline-secondary btn-sm"
        data-bs-toggle="collapse"
        data-bs-target="#cliente-filtros"
        aria-expanded="false"
        aria-controls="cliente-filtros">
        <i class="fa-solid fa-filter me-1"></i>
        Filtrar Pesquisa
      </button>
    </div>

    <div id="cliente-filtros" class="collapse filters-collapse">
      <div class="card-body border-bottom">
        <form class="row g-2 align-items-center" (ngSubmit)="pesquisar()">
          <div class="col-12 col-md">
            <input
              id="filtro-nome"
              type="text"
              name="nome"
              class="form-control"
              placeholder="Nome"
              aria-label="Nome"
              [(ngModel)]="filtro.nome">
          </div>
          <div class="col-12 col-md">
            <input
              id="filtro-cpf-cnpj"
              type="text"
              name="cpfCnpj"
              class="form-control"
              placeholder="CPF/CNPJ"
              aria-label="CPF/CNPJ"
              [(ngModel)]="filtro.cpfCnpj">
          </div>
          <div class="col-6 col-md-auto">
            <button type="submit" class="btn btn-primary w-100" title="Pesquisar" aria-label="Pesquisar">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
          <div class="col-6 col-md-auto">
            <button type="button" class="btn btn-outline-secondary w-100" title="Limpar filtros" aria-label="Limpar filtros" (click)="limparFiltros()">
              <i class="fa-solid fa-eraser"></i>
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="card-body">
      <!-- Grid server-side: as linhas são renderizadas pelo DataTables. -->
      <div class="table-responsive">
        <table id="datatables-pesquisar-clientes" class="table table-striped table-hover align-middle w-100">
          <thead>
            <tr>
              <th>Ações</th>
              <th>ID</th>
              <th>Nome</th>
              <th>Tipo de Pessoa</th>
              <th>CPF/CNPJ</th>
              <th>Telefone</th>
              <th>Whatsapp?</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>
  </section>
</section>
