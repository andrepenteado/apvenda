<ngx-ui-loader
  loaderId="marca-pesquisar"
  fgsType="ball-spin-clockwise"
  fgsColor="#0d6efd"
  overlayColor="rgba(255,255,255,0.6)"
  pbColor="#0d6efd"
  [hasProgressBar]="true">
</ngx-ui-loader>

<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">
      <a routerLink="/pagina-inicial"><i class="fa-solid fa-house"></i></a>
    </li>
    <li class="breadcrumb-item active" aria-current="page">Marcas</li>
  </ol>
</nav>

<div class="container">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h4 mb-0">Marcas</h1>
    <a class="btn btn-primary" routerLink="/marca/cadastro">
      <i class="fa-solid fa-plus me-1"></i>Novo
    </a>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label">Campo</label>
          <select class="form-select" [(ngModel)]="campoPesquisa">
            @for (campo of camposPesquisa; track campo.campo) {
              <option [value]="campo.campo">{{ campo.label }}</option>
            }
          </select>
        </div>
        <div class="col-12 col-md-5">
          <label class="form-label">Valor</label>
          <input type="text" class="form-control" [(ngModel)]="valorPesquisa">
        </div>
        <div class="col-12 col-md-3 d-flex gap-2 justify-content-md-end">
          <button type="button" class="btn btn-primary btn-sm" (click)="pesquisar()">
            <i class="fa-solid fa-magnifying-glass me-1"></i>Pesquisar
          </button>
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="limparPesquisa()">
            <i class="fa-solid fa-eraser me-1"></i>Limpar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-striped table-bordered align-middle" id="datatables-pesquisar-marcas">
      <thead>
        <tr>
          <th class="text-center acoes">Ações</th>
          <th>Id</th>
          <th>Descrição</th>
        </tr>
      </thead>
      <tbody>
        @for (marca of marcas; track marca.id) {
          <tr>
            <td class="text-center">
              <button type="button" class="btn-icon" title="Editar" (click)="editar(marca)">
                <i class="fa-solid fa-pen-to-square text-primary"></i>
              </button>
              <button type="button" class="btn-icon" title="Excluir" (click)="excluir(marca)">
                <i class="fa-solid fa-trash text-danger"></i>
              </button>
            </td>
            <td>{{ marca.id }}</td>
            <td>{{ marca.descricao }}</td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="text-center text-muted py-4">Nenhuma Marca encontrada.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

</div>
