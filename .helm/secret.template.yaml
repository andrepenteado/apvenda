# MODELO versionado. Copie para .helm/secret.yaml (git-ignored) e preencha os valores reais.
apiVersion: v1
kind: Secret
metadata:
  name: apvenda-secrets
  namespace: apvenda
type: Opaque
stringData:
  DB_PASSWORD: "<senha-do-banco>"
  OIDC_CLIENT_SECRET: "<client-secret-oidc-de-producao>"
---
# imagePullSecret do ghcr.io. .dockerconfigjson = base64 de:
# {"auths":{"ghcr.io":{"auth":"<base64 user:token>"}},"aliases":{"builder":"buildx"}}
apiVersion: v1
kind: Secret
metadata:
  name: github-secret
  namespace: apvenda
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-dockerconfigjson>
